name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind)
        run: npm run build
        env:
          # Google ログインボタンをクライアント JS に焼き込むためのビルド時変数。
          # GitHub: Settings → Secrets and variables → Actions → Variables タブで
          # PUBLIC_GOOGLE_CLIENT_ID という名前のリポジトリ変数を追加してください。
          # 値が公開値 (Google OAuth Client ID) なので「シークレット」ではなく
          # 「Variable」が適切です。未設定でもビルドは通り、ログイン機能だけが
          # 無効化されます (オフラインファースト設計)。
          PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Compute single-line commit subject (ASCII-safe)
        id: subject
        run: |
          # First line of commit message, ASCII-only (Cloudflare API rejects non-ASCII)
          SUBJECT=$(git log -1 --pretty=%s)
          # Strip non-ASCII chars to satisfy Cloudflare API
          SAFE=$(printf '%s' "$SUBJECT" | LC_ALL=C tr -cd 'A-Za-z0-9 _.,:;@/()+\-' | head -c 120)
          # Fallback if everything got stripped
          if [ -z "$SAFE" ]; then SAFE="commit ${GITHUB_SHA::8}"; fi
          echo "value=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hiraku --branch=main --commit-message="${{ steps.subject.outputs.value }}" --commit-hash="${{ github.sha }}"
